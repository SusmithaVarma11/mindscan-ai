<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MindScan AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; overflow: hidden; }
        .gradient-side {
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            background-size: 200% 200%;
            animation: moveGradient 10s ease infinite;
        }
        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>
    <div class="flex h-screen w-full">
        <div class="hidden lg:flex lg:w-1/2 gradient-side items-center justify-center p-12 relative">
            <div class="absolute top-0 left-0 w-full h-full bg-black/10"></div>
            <div class="relative z-10 text-white max-w-md">
                <h1 class="text-6xl font-black mb-6">Your Mind,<br><span class="text-white/70">Analyzed.</span></h1>
                <p class="text-lg text-white/80 leading-relaxed font-light">Join thousands using MindScan AI to better understand emotional health through language patterns.</p>
            </div>
        </div>

        <div class="w-full lg:w-1/2 flex items-center justify-center p-8 bg-[#0f172a]">
            <div class="w-full max-w-md">
                <div class="mb-10 text-center lg:text-left">
                    <h2 class="text-4xl font-bold text-white mb-2">Welcome Back</h2>
                    <p class="text-slate-400">Enter your credentials to access the AI engine.</p>
                </div>

                {% if error %}
                <div class="bg-rose-500/10 border border-rose-500/50 text-rose-400 p-4 rounded-xl mb-6 text-sm">
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST" action="/login" class="space-y-6">
                    <div>
                        <label class="block text-slate-300 text-sm font-semibold mb-2">Username</label>
                        <input type="text" name="username" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-5 py-4 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="admin" required>
                    </div>
                    <div>
                        <label class="block text-slate-300 text-sm font-semibold mb-2">Password</label>
                        <input type="password" name="password" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-5 py-4 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-pink-600 hover:from-indigo-500 hover:to-pink-500 text-white font-bold py-4 rounded-xl shadow-lg transition-all transform hover:scale-[1.01] active:scale-[0.99]">
                        Sign In
                    </button>
                </form>
                
                <p class="mt-8 text-center text-slate-500 text-sm">
                    Demo Mode: User is <span class="text-indigo-400">admin</span> / <span class="text-indigo-400">password123</span>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
